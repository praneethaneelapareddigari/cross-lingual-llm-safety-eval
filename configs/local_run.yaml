models:
  - provider: ollama
    model_name: llama3.2:1b
    display_name: "Llama (local, Ollama)"
  - provider: ollama
    model_name: gemma:2b
    display_name: "Gemma (local, Ollama)"
  - provider: ollama
    model_name: qwen2:1.5b
    display_name: "Qwen (local, Ollama)"

run_settings:
  max_tokens: 512
  temperature: 0.0
  requests_per_minute_cap: 60
  retry_attempts: 3
  input_prompts: "data/assembled_prompts.jsonl"
  output_path: "results/raw_outputs_local.jsonl"
